<!DOCTYPE html>
<html>
<head>
    <title>Online Mobile Store</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#121212;
            color:white;
        }

        /* NAVBAR */

        .navbar{
            background:black;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#00bfff;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin:0 10px;
            font-size:18px;
        }

        .nav-links a:hover{
            color:#00bfff;
        }

        /* SEARCH */

        .search-box input{
            padding:10px;
            width:250px;
            border-radius:10px;
            border:none;
        }

        .search-box button{
            padding:10px;
            border:none;
            border-radius:10px;
            background:#00bfff;
            color:white;
            cursor:pointer;
        }

        /* MESSAGE */

        .msg{
            background:green;
            padding:12px;
            margin:10px;
            border-radius:10px;
            text-align:center;
        }

        /* CONTENT */

        .container{
            padding:20px;
        }

        /* FOOTER */

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .navbar{
                flex-direction:column;
                gap:15px;
            }

            .search-box input{
                width:100%;
            }
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            📱 Mobile Store
        </div>

        <div class="nav-links">

            <a href="{% url 'home' %}">🏠 Home</a>

            <a href="{% url 'cart' %}">
                🛒 Cart
            </a>

            <a href="{% url 'order_history' %}">
                📦 Orders
            </a>

            <a href="{% url 'about' %}">
                ℹ️ About
            </a>

            <a href="{% url 'contact' %}">
                📞 Contact
            </a>

            {% if user.is_authenticated %}

                <span>👤 {{ user.username }}</span>

                <a href="{% url 'logout' %}">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'login' %}">
                    Login
                </a>

                <a href="{% url 'register' %}">
                    Register
                </a>

            {% endif %}

        </div>

        <!-- SEARCH -->

        <div class="search-box">

            <form method="GET" action="{% url 'home' %}">

                <input type="text" name="q" placeholder="🔍 Search mobiles">

                <button type="submit">
                    Search
                </button>

            </form>

        </div>

    </div>

    <!-- SUCCESS MESSAGES -->

    {% for message in messages %}

        <div class="msg">
            {{ message }}
        </div>

    {% endfor %}

    <!-- CONTENT -->

    <div class="container">

        {% block content %}

        {% endblock %}

    </div>

    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 Online Mobile Store
        </p>

    </footer>

</body>
</html>
