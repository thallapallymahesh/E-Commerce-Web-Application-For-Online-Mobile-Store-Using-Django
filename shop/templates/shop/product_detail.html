<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            padding: 30px;
        }

        .container{
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            display: flex;
            gap: 40px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        .image img{
            width: 350px;
            border-radius: 15px;
        }

        .details{
            flex: 1;
        }

        h1{
            font-size: 35px;
        }

        .price{
            color: green;
            font-size: 28px;
            margin: 20px 0;
        }

        .description{
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn{
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .cart-btn{
            background: #ff6600;
        }

        .cart-btn:hover{
            background: #e65c00;
        }

        .back-btn{
            background: black;
        }

        .back-btn:hover{
            background: #333;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="image">
            <img src="{{ product.image.url }}">
        </div>

        <div class="details">

            <h1>{{ product.name }}</h1>

            <div class="price">
                ₹{{ product.price }}
            </div>

            <div class="description">
                {{ product.description }}
            </div>

            <a href="{% url 'add_to_cart' product.id %}">
                <button class="btn cart-btn">
                    Add To Cart
                </button>
            </a>

            <a href="{% url 'home' %}">
                <button class="btn back-btn">
                    Back
                </button>
            </a>

        </div>

    </div>

</body>
</html>
