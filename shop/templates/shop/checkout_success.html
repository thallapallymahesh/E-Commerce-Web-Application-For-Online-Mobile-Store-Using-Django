<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-box{
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 450px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            animation: pop 0.5s ease;
        }

        @keyframes pop{
            0%{
                transform: scale(0.7);
                opacity: 0;
            }

            100%{
                transform: scale(1);
                opacity: 1;
            }
        }

        .tick{
            font-size: 80px;
            color: #2ecc71;
        }

        h1{
            color: #2c3e50;
            margin-top: 10px;
        }

        p{
            color: gray;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn{
            display: inline-block;
            padding: 14px 25px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            transition: 0.3s;
        }

        .home-btn{
            background: #3498db;
        }

        .home-btn:hover{
            background: #2980b9;
        }

        .orders-btn{
            background: #2ecc71;
        }

        .orders-btn:hover{
            background: #27ae60;
        }

    </style>
</head>
<body>

    <div class="success-box">

        <div class="tick">
            ✔
        </div>

        <h1>Order Placed Successfully!</h1>

        <p>
            Thank you for shopping with us.
            Your mobile order has been confirmed.
        </p>

        <a href="{% url 'home' %}" class="btn home-btn">
            Continue Shopping
        </a>

        <a href="{% url 'order_history' %}" class="btn orders-btn">
            View Orders
        </a>

    </div>

</body>
</html>
