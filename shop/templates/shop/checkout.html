<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container{
            width: 80%;
            margin: auto;
        }

        h1{
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .checkout-box{
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .checkout-box:hover{
            transform: scale(1.01);
        }

        .checkout-box img{
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
        }

        .details{
            flex: 1;
        }

        .details h3{
            margin: 0;
            color: #333;
        }

        .price{
            color: #27ae60;
            font-size: 18px;
            margin-top: 10px;
            font-weight: bold;
        }

        .quantity{
            margin-top: 10px;
            font-size: 17px;
        }

        .total{
            margin-top: 10px;
            color: #e74c3c;
            font-size: 18px;
            font-weight: bold;
        }

        .grand-total{
            text-align: right;
            font-size: 28px;
            color: #2c3e50;
            margin-top: 20px;
        }

        .btn-box{
            text-align: center;
            margin-top: 30px;
        }

        .btn{
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            margin: 10px;
        }

        .pay-btn{
            background: #2ecc71;
        }

        .pay-btn:hover{
            background: #27ae60;
        }

        .back-btn{
            background: #3498db;
        }

        .back-btn:hover{
            background: #2980b9;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>💳 Checkout Page</h1>

        {% for item in items %}

        <div class="checkout-box">

            <img src="{{ item.product.image.url }}">

            <div class="details">

                <h3>{{ item.product.name }}</h3>

                <p class="price">
                    Price: ₹{{ item.product.price }}
                </p>

                <p class="quantity">
                    Quantity: {{ item.quantity }}
                </p>

                <p class="total">
                    Total:
                    ₹{% widthratio item.product.price 1 item.quantity %}
                </p>

            </div>

        </div>

        {% endfor %}

        <h2 class="grand-total">
            Grand Total: ₹{{ total }}
        </h2>

        <div class="btn-box">

            <form method="POST">
                {% csrf_token %}

                <button type="submit" class="btn pay-btn">
                    Place Order
                </button>
            </form>

            <a href="{% url 'cart' %}" class="btn back-btn">
                Back to Cart
            </a>

        </div>

    </div>

</body>
</html>
